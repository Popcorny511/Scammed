
<!DOCTYPE html>
<html>
<head>
    <title>Button Example</title>
</head>
<body>

    <p id="message">Hello!</p>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("message").textContent = "Button was clicked!";
        }
    </script>

</body>
</html>
